<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>サウナマスター</title>
<meta name="theme-color" content="#1b1410">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="サウナマスター">
<link rel="manifest" href="manifest.json">
<style>
  :root {
    --bg: #120d0a;
    --surface: #1c1512;
    --surface-2: #251c17;
    --border: #382a22;
    --text: #f2e9e0;
    --text-dim: #a8968a;
    --accent: #ff7a3d;
    --accent-dim: #6b3d22;
    --gold: #ffb545;
    --green: #4caf7d;
  }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body {
    margin: 0; padding: 0; background: var(--bg); color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Yu Gothic", sans-serif;
    overscroll-behavior-y: none;
  }
  #app { max-width: 560px; margin: 0 auto; padding-bottom: 100px; min-height: 100vh; }

  header {
    position: sticky; top: 0; z-index: 10;
    background: linear-gradient(180deg, var(--bg) 70%, rgba(18,13,10,0));
    padding: env(safe-area-inset-top, 20px) 16px 8px;
  }
  header h1 {
    font-size: 22px; margin: 8px 0 12px; display: flex; align-items: center; gap: 8px;
  }
  header h1 .dot { color: var(--accent); }

  .stats { display: flex; gap: 8px; margin-bottom: 12px; }
  .stat {
    flex: 1; background: var(--surface); border: 1px solid var(--border);
    border-radius: 12px; padding: 10px 12px; text-align: center;
  }
  .stat .num { font-size: 18px; font-weight: 700; }
  .stat .label { font-size: 11px; color: var(--text-dim); margin-top: 2px; }

  .searchbar {
    display: flex; gap: 8px; margin-bottom: 10px;
  }
  .searchbar input {
    flex: 1; background: var(--surface); border: 1px solid var(--border);
    border-radius: 10px; padding: 10px 12px; color: var(--text); font-size: 15px;
  }
  .searchbar input::placeholder { color: var(--text-dim); }

  .filters { display: flex; gap: 6px; overflow-x: auto; padding-bottom: 4px; margin-bottom: 4px; }
  .chip {
    flex: none; padding: 6px 14px; border-radius: 999px; font-size: 13px;
    background: var(--surface); border: 1px solid var(--border); color: var(--text-dim);
    cursor: pointer; user-select: none;
  }
  .chip.active { background: var(--accent); border-color: var(--accent); color: #1b0e05; font-weight: 600; }

  .sortrow { display: flex; justify-content: flex-end; margin: 4px 0 10px; }
  .sortrow select {
    background: var(--surface); border: 1px solid var(--border); color: var(--text-dim);
    border-radius: 8px; padding: 6px 8px; font-size: 12px;
  }

  main { padding: 0 16px; }

  .empty { text-align: center; color: var(--text-dim); padding: 60px 20px; font-size: 14px; line-height: 1.8; }

  .card {
    background: var(--surface); border: 1px solid var(--border); border-radius: 14px;
    padding: 14px; margin-bottom: 10px; cursor: pointer; transition: border-color .15s;
  }
  .card.visited { border-color: var(--accent-dim); }
  .card-top { display: flex; justify-content: space-between; align-items: flex-start; gap: 8px; }
  .card-name { font-size: 16px; font-weight: 600; }
  .card-area { font-size: 12px; color: var(--text-dim); margin-top: 2px; }
  .card-badge {
    font-size: 11px; padding: 3px 8px; border-radius: 999px; white-space: nowrap; flex: none;
  }
  .badge-visited { background: rgba(76,175,125,.15); color: var(--green); }
  .badge-unvisited { background: rgba(168,150,138,.12); color: var(--text-dim); }
  .card-bottom { display: flex; justify-content: space-between; align-items: center; margin-top: 8px; }
  .stars { color: var(--gold); font-size: 14px; letter-spacing: 1px; }
  .stars.empty-stars { color: var(--border); }
  .card-memo { font-size: 12px; color: var(--text-dim); margin-top: 6px; line-height: 1.5;
    display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
  .card-link { display: inline-block; font-size: 12px; color: var(--accent); margin-top: 8px; text-decoration: none; }
  .card-link:active { opacity: .7; }

  .fab {
    position: fixed; right: 20px; bottom: calc(24px + env(safe-area-inset-bottom, 0px));
    width: 56px; height: 56px; border-radius: 50%; background: var(--accent);
    color: #1b0e05; font-size: 28px; border: none; box-shadow: 0 6px 20px rgba(255,122,61,.4);
    display: flex; align-items: center; justify-content: center; cursor: pointer; z-index: 20;
  }

  .sheet-backdrop {
    position: fixed; inset: 0; background: rgba(0,0,0,.5); z-index: 30;
    display: none; align-items: flex-end;
  }
  .sheet-backdrop.open { display: flex; }
  .sheet {
    background: var(--surface); width: 100%; max-width: 560px; margin: 0 auto;
    border-radius: 18px 18px 0 0; padding: 18px 18px calc(18px + env(safe-area-inset-bottom, 0px));
    max-height: 88vh; overflow-y: auto;
  }
  .sheet-handle { width: 40px; height: 4px; background: var(--border); border-radius: 2px; margin: 0 auto 14px; }
  .sheet h2 { font-size: 18px; margin: 0 0 16px; }
  .field { margin-bottom: 14px; }
  .field label { display: block; font-size: 12px; color: var(--text-dim); margin-bottom: 6px; }
  .field input[type=text], .field input[type=date], .field textarea {
    width: 100%; background: var(--surface-2); border: 1px solid var(--border); border-radius: 10px;
    padding: 10px 12px; color: var(--text); font-size: 15px; font-family: inherit;
  }
  .field textarea { resize: vertical; min-height: 60px; }

  .visited-toggle { display: flex; gap: 8px; }
  .visited-toggle button {
    flex: 1; padding: 10px; border-radius: 10px; border: 1px solid var(--border);
    background: var(--surface-2); color: var(--text-dim); font-size: 14px; cursor: pointer;
  }
  .visited-toggle button.active-visited { background: rgba(76,175,125,.18); border-color: var(--green); color: var(--green); font-weight: 600; }
  .visited-toggle button.active-unvisited { background: var(--surface-2); border-color: var(--accent); color: var(--accent); font-weight: 600; }

  .star-input { display: flex; gap: 6px; font-size: 28px; }
  .star-input span { color: var(--border); cursor: pointer; }
  .star-input span.filled { color: var(--gold); }

  .sheet-actions { display: flex; gap: 10px; margin-top: 18px; }
  .btn {
    flex: 1; padding: 13px; border-radius: 12px; border: none; font-size: 15px; font-weight: 600; cursor: pointer;
  }
  .btn-primary { background: var(--accent); color: #1b0e05; }
  .btn-secondary { background: var(--surface-2); color: var(--text); border: 1px solid var(--border); }
  .btn-danger { background: rgba(220,80,60,.15); color: #ff6b52; border: 1px solid rgba(220,80,60,.3); flex: none; padding: 13px 16px; }

  ::-webkit-scrollbar { display: none; }
</style>
</head>
<body>

<div id="app">
  <header>
    <h1><span class="dot">◉</span> サウナマスター</h1>
    <div class="stats">
      <div class="stat"><div class="num" id="stat-total">0</div><div class="label">登録数</div></div>
      <div class="stat"><div class="num" id="stat-visited">0</div><div class="label">訪問済み</div></div>
      <div class="stat"><div class="num" id="stat-avg">-</div><div class="label">平均評価</div></div>
    </div>
    <div class="searchbar">
      <input type="text" id="search" placeholder="施設名・エリアで検索">
    </div>
    <div class="filters">
      <div class="chip active" data-filter="all">すべて</div>
      <div class="chip" data-filter="unvisited">未訪問</div>
      <div class="chip" data-filter="visited">訪問済み</div>
    </div>
    <div class="sortrow">
      <select id="sort">
        <option value="added">追加順</option>
        <option value="rating">評価が高い順</option>
        <option value="name">名前順</option>
      </select>
    </div>
  </header>

  <main>
    <div id="list"></div>
    <div class="empty" id="empty" style="display:none">該当するサウナがありません<br>右下の + から追加できます</div>
  </main>
</div>

<button class="fab" id="fab">＋</button>

<div class="sheet-backdrop" id="sheetBackdrop">
  <div class="sheet">
    <div class="sheet-handle"></div>
    <h2 id="sheetTitle">サウナを追加</h2>
    <input type="hidden" id="editId">
    <div class="field">
      <label>施設名</label>
      <input type="text" id="f-name" placeholder="例: サウナ東京">
    </div>
    <div class="field">
      <label>エリア</label>
      <input type="text" id="f-area" placeholder="例: 千代田区(神田)">
    </div>
    <div class="field">
      <label>公式サイトURL</label>
      <input type="text" id="f-url" placeholder="https://...">
    </div>
    <div class="field">
      <label>訪問状況</label>
      <div class="visited-toggle">
        <button type="button" id="btn-unvisited">未訪問</button>
        <button type="button" id="btn-visited">訪問済み</button>
      </div>
    </div>
    <div class="field">
      <label>評価</label>
      <div class="star-input" id="starInput">
        <span data-v="1">★</span><span data-v="2">★</span><span data-v="3">★</span><span data-v="4">★</span><span data-v="5">★</span>
      </div>
    </div>
    <div class="field">
      <label>訪問日</label>
      <input type="date" id="f-date">
    </div>
    <div class="field">
      <label>メモ</label>
      <textarea id="f-memo" placeholder="ロウリュ最高、水風呂は◯度、混雑状況など"></textarea>
    </div>
    <div class="sheet-actions">
      <button class="btn btn-danger" id="btn-delete" style="display:none">削除</button>
      <button class="btn btn-secondary" id="btn-cancel">キャンセル</button>
      <button class="btn btn-primary" id="btn-save">保存</button>
    </div>
  </div>
</div>

<script src="https://www.gstatic.com/firebasejs/10.13.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.13.0/firebase-database-compat.js"></script>
<script>
const firebaseConfig = {
  apiKey: "AIzaSyDzXdpegOALM8-HokzbiwnI6A2lm0pGyQE",
  authDomain: "sauna-master-daizmk.firebaseapp.com",
  databaseURL: "https://sauna-master-daizmk-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "sauna-master-daizmk",
  storageBucket: "sauna-master-daizmk.firebasestorage.app",
  messagingSenderId: "423289255802",
  appId: "1:423289255802:web:5f70536d37a495149388c3"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.database();
const saunasRef = db.ref('saunas');

let saunas = {};
let currentFilter = 'all';
let currentSort = 'added';
let currentSearch = '';
let editingRating = 0;
let editingVisited = false;

const listEl = document.getElementById('list');
const emptyEl = document.getElementById('empty');

saunasRef.on('value', snap => {
  saunas = snap.val() || {};
  render();
});

function render() {
  const q = currentSearch.trim().toLowerCase();
  let items = Object.entries(saunas).map(([id, s]) => ({ id, ...s }));

  if (currentFilter === 'visited') items = items.filter(s => s.visited);
  if (currentFilter === 'unvisited') items = items.filter(s => !s.visited);
  if (q) items = items.filter(s =>
    (s.name || '').toLowerCase().includes(q) || (s.area || '').toLowerCase().includes(q)
  );

  if (currentSort === 'rating') {
    items.sort((a, b) => (b.rating || 0) - (a.rating || 0));
  } else if (currentSort === 'name') {
    items.sort((a, b) => (a.name || '').localeCompare(b.name || '', 'ja'));
  } else {
    items.sort((a, b) => (a.createdAt || 0) - (b.createdAt || 0));
  }

  const total = Object.keys(saunas).length;
  const visitedList = Object.values(saunas).filter(s => s.visited);
  const ratedList = visitedList.filter(s => s.rating > 0);
  document.getElementById('stat-total').textContent = total;
  document.getElementById('stat-visited').textContent = visitedList.length;
  document.getElementById('stat-avg').textContent = ratedList.length
    ? (ratedList.reduce((a, s) => a + s.rating, 0) / ratedList.length).toFixed(1)
    : '-';

  listEl.innerHTML = '';
  emptyEl.style.display = items.length ? 'none' : 'block';

  for (const s of items) {
    const card = document.createElement('div');
    card.className = 'card' + (s.visited ? ' visited' : '');
    const starStr = starString(s.rating || 0);
    card.innerHTML = `
      <div class="card-top">
        <div>
          <div class="card-name">${escapeHtml(s.name || '')}</div>
          <div class="card-area">${escapeHtml(s.area || '')}</div>
        </div>
        <div class="card-badge ${s.visited ? 'badge-visited' : 'badge-unvisited'}">${s.visited ? '訪問済み' : '未訪問'}</div>
      </div>
      <div class="card-bottom">
        <div class="stars${s.rating ? '' : ' empty-stars'}">${starStr}</div>
        <div class="card-area">${s.visitDate ? s.visitDate : ''}</div>
      </div>
      ${s.memo ? `<div class="card-memo">${escapeHtml(s.memo)}</div>` : ''}
      ${safeUrl(s.url) ? `<a class="card-link" href="${escapeHtml(safeUrl(s.url))}" target="_blank" rel="noopener noreferrer">🔗 公式サイト</a>` : ''}
    `;
    const link = card.querySelector('.card-link');
    if (link) link.addEventListener('click', e => e.stopPropagation());
    card.addEventListener('click', () => openSheet(s));
    listEl.appendChild(card);
  }
}

function starString(rating) {
  const full = '★'.repeat(rating);
  const empty = '☆'.repeat(5 - rating);
  return full + empty;
}

function safeUrl(url) {
  if (!url) return '';
  try {
    const u = new URL(url);
    return (u.protocol === 'http:' || u.protocol === 'https:') ? u.href : '';
  } catch {
    return '';
  }
}

function escapeHtml(str) {
  const div = document.createElement('div');
  div.textContent = str;
  return div.innerHTML;
}

document.querySelectorAll('.chip').forEach(chip => {
  chip.addEventListener('click', () => {
    document.querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
    chip.classList.add('active');
    currentFilter = chip.dataset.filter;
    render();
  });
});

document.getElementById('sort').addEventListener('change', e => {
  currentSort = e.target.value;
  render();
});

document.getElementById('search').addEventListener('input', e => {
  currentSearch = e.target.value;
  render();
});

const sheetBackdrop = document.getElementById('sheetBackdrop');
const sheetTitle = document.getElementById('sheetTitle');
const editIdEl = document.getElementById('editId');
const btnDelete = document.getElementById('btn-delete');

function openSheet(sauna) {
  editIdEl.value = sauna ? sauna.id : '';
  sheetTitle.textContent = sauna ? 'サウナを編集' : 'サウナを追加';
  document.getElementById('f-name').value = sauna ? sauna.name || '' : '';
  document.getElementById('f-area').value = sauna ? sauna.area || '' : '';
  document.getElementById('f-url').value = sauna ? sauna.url || '' : '';
  document.getElementById('f-date').value = sauna ? sauna.visitDate || '' : '';
  document.getElementById('f-memo').value = sauna ? sauna.memo || '' : '';
  editingRating = sauna ? (sauna.rating || 0) : 0;
  editingVisited = sauna ? !!sauna.visited : false;
  updateVisitedButtons();
  updateStars();
  btnDelete.style.display = sauna ? 'block' : 'none';
  sheetBackdrop.classList.add('open');
}

function closeSheet() {
  sheetBackdrop.classList.remove('open');
}

document.getElementById('fab').addEventListener('click', () => openSheet(null));
document.getElementById('btn-cancel').addEventListener('click', closeSheet);
sheetBackdrop.addEventListener('click', e => { if (e.target === sheetBackdrop) closeSheet(); });

const btnVisited = document.getElementById('btn-visited');
const btnUnvisited = document.getElementById('btn-unvisited');
function updateVisitedButtons() {
  btnVisited.classList.toggle('active-visited', editingVisited);
  btnUnvisited.classList.toggle('active-unvisited', !editingVisited);
}
btnVisited.addEventListener('click', () => { editingVisited = true; updateVisitedButtons(); });
btnUnvisited.addEventListener('click', () => { editingVisited = false; updateVisitedButtons(); });

const starInput = document.getElementById('starInput');
function updateStars() {
  starInput.querySelectorAll('span').forEach(el => {
    el.classList.toggle('filled', Number(el.dataset.v) <= editingRating);
  });
}
starInput.querySelectorAll('span').forEach(el => {
  el.addEventListener('click', () => {
    const v = Number(el.dataset.v);
    editingRating = (editingRating === v) ? 0 : v;
    updateStars();
  });
});

document.getElementById('btn-save').addEventListener('click', () => {
  const name = document.getElementById('f-name').value.trim();
  if (!name) { document.getElementById('f-name').focus(); return; }
  const data = {
    name,
    area: document.getElementById('f-area').value.trim(),
    url: document.getElementById('f-url').value.trim(),
    visited: editingVisited,
    rating: editingRating,
    visitDate: document.getElementById('f-date').value,
    memo: document.getElementById('f-memo').value.trim(),
  };
  const id = editIdEl.value;
  if (id) {
    saunasRef.child(id).update(data);
  } else {
    data.createdAt = Date.now();
    saunasRef.push(data);
  }
  closeSheet();
});

btnDelete.addEventListener('click', () => {
  const id = editIdEl.value;
  if (id && confirm('このサウナを削除しますか？')) {
    saunasRef.child(id).remove();
    closeSheet();
  }
});

if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js').catch(() => {});
}
</script>
</body>
</html>
